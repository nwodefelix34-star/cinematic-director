name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label (e.g. 1.0, 1.1)'
        required: false
        default: 'latest'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Verify plugins in node_modules
        run: |
          echo "=== @capacitor/browser ==="
          ls node_modules/@capacitor/browser/package.json && echo "✅ installed" || echo "❌ MISSING"
          echo "=== cordova-plugin-inappbrowser ==="
          ls node_modules/cordova-plugin-inappbrowser/package.json && echo "✅ installed" || echo "❌ MISSING"
          echo "=== @capacitor/filesystem ==="
          ls node_modules/@capacitor/filesystem/package.json && echo "✅ installed" || echo "❌ MISSING"

      - name: Build React app
        run: npx vite build
        env:
          VITE_BUILD_TARGET: mobile
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          VITE_API_KEY:      ${{ secrets.GEMINI_API_KEY }}

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor + Cordova plugins into Android
        run: npx cap sync android

      - name: Verify cordova plugin registered in Android build
        run: |
          echo "=== Cordova plugins registered ==="
          find android -name "InAppBrowser*" 2>/dev/null | head -10 || echo "(not found yet)"
          ls android/capacitor-cordova-android-plugins/ 2>/dev/null || echo "(no cordova plugins dir)"

      - name: Force copy dist to Android assets
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -rv dist/* android/app/src/main/assets/public/

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        run: |
          APK=$(find android -name "app-debug.apk" | head -1)
          cp "$APK" "CinematicDirector-v${{ github.event.inputs.version }}.apk"
          echo "APK_FILE=CinematicDirector-v${{ github.event.inputs.version }}.apk" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CinematicDirector-Android-v${{ github.event.inputs.version }}
          path: ${{ env.APK_FILE }}
          retention-days: 30
