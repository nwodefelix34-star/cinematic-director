name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label (e.g. 1.0, 1.1)'
        required: false
        default: 'latest'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Verify plugins in node_modules
        run: |
          ls node_modules/@capacitor/browser/package.json     && echo "✅ @capacitor/browser"     || echo "❌ MISSING"
          ls node_modules/@capacitor/filesystem/package.json  && echo "✅ @capacitor/filesystem"  || echo "❌ MISSING"
          ls node_modules/cordova-plugin-inappbrowser/package.json && echo "✅ cordova-plugin-inappbrowser" || echo "❌ MISSING"

      - name: Build React app
        run: npx vite build
        env:
          VITE_BUILD_TARGET: mobile
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor + Cordova plugins into Android
        run: npx cap sync android

      - name: Inject CineBrowser native plugin
        run: |
          JAVA_DIR=android/app/src/main/java/com/cinematicdirector/app
          cp CineBrowserActivity.java "$JAVA_DIR/CineBrowserActivity.java"
          cp CineBrowserPlugin.java   "$JAVA_DIR/CineBrowserPlugin.java"
          echo "✅ Java files copied"
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q "CineBrowserActivity" "$MANIFEST"; then
            sed -i 's|</application>|        <activity android:name=".CineBrowserActivity" android:exported="false" />\n    </application>|' "$MANIFEST"
          fi
          echo "✅ Manifest patched"
          python3 patch_mainactivity.py
          echo "=== MainActivity ===" && cat "$JAVA_DIR/MainActivity.java"

      - name: Force copy dist to Android assets
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -rv dist/* android/app/src/main/assets/public/

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        run: |
          APK=$(find android -name "app-debug.apk" | head -1)
          cp "$APK" "CinematicDirector-v${{ github.event.inputs.version }}.apk"
          echo "APK_FILE=CinematicDirector-v${{ github.event.inputs.version }}.apk" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CinematicDirector-Android-v${{ github.event.inputs.version }}
          path: ${{ env.APK_FILE }}
          retention-days: 30
