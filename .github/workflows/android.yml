name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label (e.g. 1.0, 1.1)'
        required: false
        default: 'latest'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install --legacy-peer-deps \
            @capacitor/core@6 \
            @capacitor/cli@6 \
            @capacitor/android@6 \
            @capacitor-community/inappbrowser

      - name: Build React app
        run: |
          npx vite build
          echo "====== DIST CONTENTS ======"
          find dist -type f | sort
          echo "====== DIST SIZE ======"
          du -sh dist/
          echo "====== DIST INDEX SIZE ======"
          wc -c dist/index.html || echo "no index.html"
          echo "====== ALL JS FILES IN DIST ======"
          find dist -name "*.js" -exec du -sh {} \;
        env:
          VITE_BUILD_TARGET: mobile
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Add Android platform
        run: |
          npx cap add android
          echo "====== CAPACITOR CONFIG ======"
          cat capacitor.config.ts || cat capacitor.config.json || echo "no cap config found"

      - name: Force copy dist to Android assets
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -rv dist/* android/app/src/main/assets/public/
          echo "====== ANDROID ASSETS CONTENTS ======"
          find android/app/src/main/assets/public -type f | sort
          echo "====== ANDROID ASSETS SIZE ======"
          du -sh android/app/src/main/assets/public/

      - name: Sync Capacitor plugins
        run: npx cap sync android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Report APK size
        run: |
          APK=$(find android -name "app-debug.apk" | head -1)
          echo "====== APK SIZE ======"
          du -sh "$APK"
          cp "$APK" "CinematicDirector-v${{ github.event.inputs.version }}.apk"
          echo "APK_FILE=CinematicDirector-v${{ github.event.inputs.version }}.apk" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CinematicDirector-Android-v${{ github.event.inputs.version }}
          path: ${{ env.APK_FILE }}
          retention-days: 30
