name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label (e.g. 1.0, 1.1)'
        required: false
        default: 'latest'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install ALL dependencies including Capacitor
        run: |
          npm install --legacy-peer-deps
          npm install --legacy-peer-deps \
            @capacitor/core@6 \
            @capacitor/cli@6 \
            @capacitor/android@6 \
            @capacitor-community/inappbrowser
          echo "✅ Dependencies installed"
          npx cap --version

      - name: Build React app for mobile
        run: |
          npx vite build
          echo "--- dist folder contents ---"
          ls -lah dist/
          echo "--- dist folder total size ---"
          du -sh dist/
        env:
          VITE_BUILD_TARGET: mobile
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Verify dist is not empty
        run: |
          DIST_SIZE=$(du -sb dist/ | cut -f1)
          echo "dist size in bytes: $DIST_SIZE"
          if [ "$DIST_SIZE" -lt 100000 ]; then
            echo "❌ dist folder is too small — React build failed"
            exit 1
          fi
          echo "✅ dist folder looks good: $(du -sh dist/ | cut -f1)"

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
            echo "✅ Android platform added"
          else
            echo "Android platform already exists"
          fi

      - name: Sync Capacitor — copies dist into Android assets
        run: |
          npx cap sync android
          echo "--- checking assets after sync ---"
          if [ -d "android/app/src/main/assets/public" ]; then
            echo "✅ Assets found:"
            du -sh android/app/src/main/assets/public/
            ls android/app/src/main/assets/public/
          else
            echo "❌ Assets folder missing — manually copying"
            mkdir -p android/app/src/main/assets/public
            cp -r dist/* android/app/src/main/assets/public/
            echo "✅ Manually copied dist to assets"
            du -sh android/app/src/main/assets/public/
          fi

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Check APK size
        run: |
          APK_PATH=$(find android -name "*.apk" -not -path "*/intermediates/*" | head -1)
          echo "APK path: $APK_PATH"
          echo "APK size: $(du -sh $APK_PATH | cut -f1)"
          cp "$APK_PATH" "CinematicDirector-v${{ github.event.inputs.version }}.apk"
          echo "APK_FILE=CinematicDirector-v${{ github.event.inputs.version }}.apk" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CinematicDirector-Android-v${{ github.event.inputs.version }}
          path: ${{ env.APK_FILE }}
          retention-days: 30
