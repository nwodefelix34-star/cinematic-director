name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label (e.g. 1.0, 1.1)'
        required: false
        default: 'latest'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install ALL dependencies including Capacitor
        run: |
          npm install --legacy-peer-deps
          npm install --legacy-peer-deps \
            @capacitor/core@6 \
            @capacitor/cli@6 \
            @capacitor/android@6 \
            @capacitor-community/inappbrowser
          echo "Capacitor version: $(npx cap --version)"

      - name: Build React app for mobile
        run: |
          npx vite build
          echo "=== dist folder ==="
          ls -lah dist/
          echo "=== dist size ==="
          du -sh dist/
          echo "=== index.html size ==="
          wc -c dist/index.html
        env:
          VITE_BUILD_TARGET: mobile
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Add Android platform
        run: npx cap add android

      - name: FORCE copy dist into Android assets
        run: |
          echo "=== Creating assets folder ==="
          mkdir -p android/app/src/main/assets/public
          echo "=== Copying dist files ==="
          cp -rv dist/* android/app/src/main/assets/public/
          echo "=== Assets folder after copy ==="
          ls -lah android/app/src/main/assets/public/
          echo "=== Assets size ==="
          du -sh android/app/src/main/assets/public/

      - name: Run cap sync for native plugins only
        run: npx cap sync android

      - name: Confirm assets still there after sync
        run: |
          echo "=== Final assets check ==="
          du -sh android/app/src/main/assets/public/
          ls android/app/src/main/assets/public/

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Check APK size and upload
        run: |
          APK_PATH=$(find android -name "app-debug.apk" | head -1)
          echo "APK path: $APK_PATH"
          echo "APK size: $(du -sh $APK_PATH | cut -f1)"
          cp "$APK_PATH" "CinematicDirector-v${{ github.event.inputs.version }}.apk"
          echo "APK_FILE=CinematicDirector-v${{ github.event.inputs.version }}.apk" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CinematicDirector-Android-v${{ github.event.inputs.version }}
          path: ${{ env.APK_FILE }}
          retention-days: 30
